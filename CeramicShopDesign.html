<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ceramic Shop - Cozy Life & Travel Archive</title>
  <!-- Tailwind CSS & Lucide Icons -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    /* 몽글몽글한 타이틀 전용 라운드 폰트 */
    .font-cozy-round {
      font-family: 'Fredoka', sans-serif;
    }
    
    /* 레퍼런스의 핵심: 구름 모양 물결 테두리(Scallop Border) 구현 */
    .scallop-top {
      background-image: radial-gradient(circle at 10px -5px, transparent 12px, #FFD2D7 13px);
      background-size: 20px 20px;
    }
    .scallop-bottom {
      background-image: radial-gradient(circle at 10px 15px, transparent 12px, #FFD2D7 13px);
      background-size: 20px 20px;
    }
    
    .scallop-green-top {
      background-image: radial-gradient(circle at 10px -5px, transparent 12px, #D0E1D4 13px);
      background-size: 20px 20px;
    }

    /* 레퍼런스 속 상품 사진들의 독특한 상단 삼중 물결 아치 프레임 */
    .wavy-arch-frame {
      border-radius: 40px 40px 12px 12px;
      clip-path: url(#wavy-clip);
    }
  </style>
</head>
<!-- 레퍼런스 특유의 포근한 밀크 바닐라(bg-[#FBF7F0]) + 딸기우유 핑크 라인 테두리 스타일 -->
<body class="bg-[#FBF7F0] text-[#4A3F3A] antialiased min-h-screen py-12 px-4 flex flex-col items-center justify-center">

  <!-- SVG ClipPath: 상품 사진 상단에 몽글몽글한 3단 물결을 넣기 위한 소스 -->
  <svg class="absolute w-0 h-0">
    <defs>
      <clipPath id="wavy-clip" clipPathUnits="objectBoundingBox">
        <path d="M 0,1 L 0,0.3 C 0.08,0.15 0.16,0.3 0.25,0.2 C 0.33,0.1 0.41,0.25 0.5,0.15 C 0.58,0.05 0.66,0.2 0.75,0.1 C 0.83,0 0.91,0.15 1,0.05 L 1,1 Z"/>
      </clipPath>
    </defs>
  </svg>

  <!-- 전체 레이아웃 컨테이너 (레퍼런스처럼 예쁜 라운드 핑크 테두리가 둘러진 스마트폰 가로 감성) -->
  <div class="w-full max-w-[400px] bg-white rounded-[50px] shadow-2xl overflow-hidden border-4 border-[#FFD2D7] p-4 flex flex-col space-y-12 relative">
    
    <!-- 1. 대문 섹션: 몽글몽글 구름 프레임 오버레이 배너 -->
    <header class="relative w-full aspect-[4/5] rounded-[38px] overflow-hidden bg-[#FFF0F2]">
      <!-- 배경 도자기 여행 스냅 사진 -->
      <img src="https://images.unsplash.com/photo-1612196808214-b8e1d6145a8c?auto=format&fit=crop&w=600&q=80" alt="Ceramic Atelier" class="w-full h-full object-cover brightness-95">
      
      <!-- 상단/하단 핑크색 몽글몽글 물결 그래픽 오버레이 (레퍼런스 완벽 재현) -->
      <div class="absolute top-0 left-0 w-full h-6 scallop-bottom bg-transparent"></div>
      <div class="absolute bottom-0 left-0 w-full h-6 scallop-top bg-transparent"></div>
      
      <!-- 중앙 타이틀 텍스트 레이어 -->
      <div class="absolute inset-0 flex flex-col justify-center items-center text-center p-6 bg-black/10">
        <span class="text-[10px] tracking-[0.3em] text-[#FF7A85] font-semibold uppercase bg-white/80 px-2.5 py-1 rounded-full mb-2">Life Travel Log</span>
        <h1 class="text-2xl md:text-3xl font-cozy-round font-semibold text-white drop-shadow-md leading-snug">
          나만의 소박한 온기,<br>세라믹 아틀리에 탐방
        </h1>
        
        <!-- 동글동글한 카탈로그 이동 버튼 스타일 -->
        <a href="#" class="mt-4 px-5 py-2 bg-white/90 text-[#FF7A85] font-cozy-round text-xs font-medium rounded-full shadow-sm hover:bg-white transition-all">
          기록 보러가기 →
        </a>
      </div>
    </header>


    <!-- 2. 여행 수집품 전시 그리드 (레퍼런스의 3단 물결 아치 및 라운드 프레임 재현) -->
    <section class="space-y-4 px-1">
      <div class="flex justify-between items-center px-1">
        <h3 class="text-base font-cozy-round font-semibold text-[#5A4B45] flex items-center gap-1">
          <i data-lucide="sparkles" class="w-4 h-4 text-[#FF7A85]"></i> 소소한 일상의 수확들
        </h3>
        <span class="text-[10px] text-gray-400 font-mono">01 / 03</span>
      </div>
      
      <!-- 가로 스크롤 혹은 오밀조밀 배치된 3개 프레임 그리드 -->
      <div class="grid grid-cols-3 gap-3">
        
        <!-- 아이템 1: 3단 물결 프레임 (레퍼런스 첫 번째 모양) -->
        <div class="space-y-2 text-center">
          <div class="w-full aspect-[4/5] bg-[#FFF0F2] rounded-t-[30px] rounded-b-xl overflow-hidden p-1 border border-[#FFD2D7]">
            <img src="https://images.unsplash.com/photo-1578749556568-bc2c40e68b61?auto=format&fit=crop&w=400&q=80" alt="Ceramic 1" class="w-full h-full object-cover rounded-t-[26px] rounded-b-lg">
          </div>
          <p class="text-[10px] font-medium text-gray-600 truncate">핸드빌딩 머그</p>
        </div>

        <!-- 아이템 2: 부드러운 고전 돔 아치형 프레임 (레퍼런스 두 번째 모양) -->
        <div class="space-y-2 text-center">
          <div class="w-full aspect-[4/5] bg-[#EAF2EC] rounded-t-full rounded-b-xl overflow-hidden p-1 border border-[#D0E1D4]">
            <img src="https://images.unsplash.com/photo-1535401991746-da3d9055713e?auto=format&fit=crop&w=400&q=80" alt="Ceramic 2" class="w-full h-full object-cover rounded-t-full rounded-b-lg">
          </div>
          <p class="text-[10px] font-medium text-gray-600 truncate">오브제 화병</p>
        </div>

        <!-- 아이템 3: 둥글린 사각형 프레임 (레퍼런스 세 번째 모양) -->
        <div class="space-y-2 text-center">
          <div class="w-full aspect-[4/5] bg-[#FFF8EC] rounded-[24px] overflow-hidden p-1 border border-[#F4E3CD]">
            <img src="https://images.unsplash.com/photo-1610701596007-11502861afaa?auto=format&fit=crop&w=400&q=80" alt="Ceramic 3" class="w-full h-full object-cover rounded-[20px]">
          </div>
          <p class="text-[10px] font-medium text-gray-600 truncate">요거트 볼 세트</p>
        </div>

      </div>
      
      <!-- 아기자기한 감성 낙서 일러스트 효과 (새싹/지그재그 물결 아이콘) -->
      <div class="flex justify-center pt-2">
        <i data-lucide="twinkle" class="w-5 h-5 text-[#FFBA00] animate-pulse"></i>
      </div>
    </section>


    <!-- 3. 하단 레터랩 배너: 연두색 몽글몽글 대형 구름 프레임 뉴스레터 구역 -->
    <section class="relative w-full bg-[#D0E1D4] rounded-[38px] p-6 text-center space-y-4 overflow-hidden border border-[#B8CFC0]">
      <!-- 상단 연두색 스캘럽 물결 오버레이 효과 -->
      <div class="absolute top-0 left-0 w-full h-4 scallop-green-top bg-transparent transform rotate-180 opacity-40"></div>
      
      <div class="space-y-1">
        <h4 class="text-sm font-cozy-round font-semibold text-[#3B4D40] tracking-wide">
          Atelier Travel Letter
        </h4>
        <p class="text-[10px] text-[#556B5C] font-light leading-relaxed">
          매달 골목길 공방에서 전하는 따뜻한 세라믹 정보와<br>비정기 라이프스타일 팝업 소식을 가장 먼저 받아보세요.
        </p>
      </div>

      <!-- 동글동글한 이메일 입력 폼 구조 (레퍼런스 완벽 반영) -->
      <div class="w-full flex items-center bg-white rounded-full p-1 shadow-2xs">
        <input type="email" placeholder="이메일을 입력해주세요" class="w-full bg-transparent text-[11px] px-3 py-1.5 focus:outline-hidden text-[#3B4D40] placeholder-gray-400">
        <button class="bg-[#3B4D40] text-white text-[10px] font-cozy-round px-4 py-1.5 rounded-full hover:bg-[#2C3B31] transition-colors whitespace-nowrap">
          구독하기
        </button>
      </div>
    </section>

    <!-- 4. [요구사항 반영] 오직 작성일만 깔끔하게 고려된 테마 맞춤형 미니멀 푸터 -->
    <footer class="pt-4 border-t border-dashed border-[#FFD2D7] text-center space-y-1">
      <p class="font-cozy-round text-xs font-semibold tracking-wider text-[#FF7A85]">p*syy ceramic diary</p>
      <div class="text-[9px] text-gray-400 space-y-0.5">
        <p>기록일자: 2026년 7월 12일 — Pottery & Wandering</p>
        <p class="opacity-70">© 2026 COZY MONGLE ATELIER. ALL RIGHTS RESERVED.</p>
      </div>
    </footer>

  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
