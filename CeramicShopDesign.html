<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>키치 세라믹 소품숍</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-[#F0E6DF] py-6 px-4 flex justify-center antialiased">

  <div class="w-full max-w-md bg-[#FFF5F5] rounded-[36px] shadow-2xl overflow-hidden flex flex-col relative text-[#5E4E4A] font-sans border border-[#F5E6E6]">
    
    <div class="absolute top-6 left-6 right-6 z-10 flex items-center justify-between">
      <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-[#5E4E4A] hover:scale-105 transition shadow-sm">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
      </button>
      <span class="font-serif font-black tracking-wider text-sm text-[#FF9494]">p✿syy</span>
      <button class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-[#5E4E4A] shadow-sm">
        <i data-lucide="shopping-bag" class="w-4 h-4"></i>
      </button>
    </div>

    <div class="pt-24 bg-[#FFE3E3] pb-10 text-center relative">
      <h1 class="text-xl font-bold tracking-tight text-[#423633] leading-snug">함께 만드는 우리 집 온기</h1>
      <p class="text-[11px] text-[#8A716C] mt-1">따뜻한 색감의 핸드메이드 도자기 편집숍</p>
      <button class="mt-4 bg-white text-[#FF9494] text-[11px] font-bold px-4 py-2 rounded-full shadow-xs">카탈로그 보기</button>
    </div>

    <div class="p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-xs font-bold text-[#423633] uppercase">✦ Best Items</h2>
      </div>
      <div class="grid grid-cols-3 gap-2.5">
        <div class="bg-white p-2 rounded-[20px] border border-[#F5E6E6] text-center">
          <div class="w-full aspect-[4/5] rounded-t-[16px] rounded-b-[8px] overflow-hidden bg-[#FDF8F8]">
            <img src="https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?auto=format&fit=crop&w=300&q=80" class="w-full h-full object-cover">
          </div>
          <p class="text-[10px] font-bold text-[#423633] truncate mt-1.5">체리 머그잔</p>
          <p class="text-[9px] text-[#FF9494] font-semibold">19,000원</p>
        </div>
        <div class="bg-white p-2 rounded-[20px] border border-[#F5E6E6] text-center">
          <div class="w-full aspect-[4/5] rounded-t-[16px] rounded-b-[8px] overflow-hidden bg-[#FDF8F8]">
            <img src="https://images.unsplash.com/photo-1576016770956-debb63d900ef?auto=format&fit=crop&w=300&q=80" class="w-full h-full object-cover">
          </div>
          <p class="text-[10px] font-bold text-[#423633] truncate mt-1.5">도트 시리얼볼</p>
          <p class="text-[9px] text-[#FF9494] font-semibold">21,000원</p>
        </div>
        <div class="bg-white p-2 rounded-[20px] border border-[#F5E6E6] text-center">
          <div class="w-full aspect-[4/5] rounded-t-[16px] rounded-b-[8px] overflow-hidden bg-[#FDF8F8]">
            <img src="https://images.unsplash.com/photo-1535401991746-da3d9055713e?auto=format&fit=crop&w=300&q=80" class="w-full h-full object-cover">
          </div>
          <p class="text-[10px] font-bold text-[#423633] truncate mt-1.5">요거트 미니컵</p>
          <p class="text-[9px] text-[#FF9494] font-semibold">16,500원</p>
        </div>
      </div>
    </div>

    <div class="p-6 bg-[#FFF5F5] text-center mt-auto border-t border-[#F5E6E6]">
      <p class="font-serif font-black text-base text-[#FF9494]">p✿syy</p>
      <p class="text-[9px] text-gray-400 mt-2">© 2026 POSYY CERAMIC.</p>
    </div>

  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
