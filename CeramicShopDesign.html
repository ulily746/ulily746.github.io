<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ceramic Diary</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 레퍼런스의 핵심: 상하단 몽글몽글 물결 프레임 */
    .scallop-mask {
      mask-image: radial-gradient(circle at 15px -5px, transparent 15px, white 16px);
      mask-size: 32px 100%;
    }
    .scallop-mask-bottom {
      mask-image: radial-gradient(circle at 15px 20px, transparent 15px, white 16px);
      mask-size: 32px 100%;
    }
  </style>
</head>
<body class="bg-[#FDF9F5] text-[#5C544E] font-sans m-0 p-0">

  <!-- 1. 대문 사진: 가로로 큰 사진 + 위아래 물결 커팅 -->
  <header class="w-full relative overflow-hidden mt-4">
    <div class="scallop-mask-bottom w-full h-8 bg-[#FDF9F5] absolute top-0 z-10"></div>
    <div class="scallop-mask w-full h-8 bg-[#FDF9F5] absolute bottom-0 z-10"></div>
    <img src="https://images.unsplash.com/photo-1578749556568-bc2c40e68b61?auto=format&fit=crop&w=1200&q=80" class="w-full h-64 object-cover">
  </header>

  <!-- 2. 원형 사진 3개 가로 배치 + 귀여운 테두리 -->
  <section class="w-full px-4 py-8">
    <div class="flex justify-between gap-2">
      <div class="text-center w-1/3">
        <div class="w-24 h-24 mx-auto rounded-full border-4 border-[#FFD1DC] p-1 overflow-hidden shadow-sm">
          <img src="https://images.unsplash.com/photo-1612196808214-b8e1d6145a8c?auto=format&fit=crop&w=300&q=80" class="w-full h-full object-cover rounded-full">
        </div>
        <p class="text-xs mt-3 font-medium">핸드메이드 머그</p>
      </div>
      <div class="text-center w-1/3">
        <div class="w-24 h-24 mx-auto rounded-full border-4 border-[#C1E1C1] p-1 overflow-hidden shadow-sm">
          <img src="https://images.unsplash.com/photo-1535401991746-da3d9055713e?auto=format&fit=crop&w=300&q=80" class="w-full h-full object-cover rounded-full">
        </div>
        <p class="text-xs mt-3 font-medium">플라워 화병</p>
      </div>
      <div class="text-center w-1/3">
        <div class="w-24 h-24 mx-auto rounded-full border-4 border-[#FDFD96] p-1 overflow-hidden shadow-sm">
          <img src="https://images.unsplash.com/photo-1610701596007-11502861afaa?auto=format&fit=crop&w=300&q=80" class="w-full h-full object-cover rounded-full">
        </div>
        <p class="text-xs mt-3 font-medium">요거트 볼</p>
      </div>
    </div>
  </section>

  <!-- 3. 다시 물결 자른 사진 배치 + 설명 -->
  <section class="w-full py-6">
    <div class="relative overflow-hidden mb-4">
      <div class="scallop-mask-bottom w-full h-8 bg-[#FDF9F5] absolute top-0 z-10"></div>
      <div class="scallop-mask w-full h-8 bg-[#FDF9F5] absolute bottom-0 z-10"></div>
      <img src="https://images.unsplash.com/photo-1490312278390-ab6e016e454a?auto=format&fit=crop&w=800&q=80" class="w-full h-56 object-cover">
    </div>
    <div class="px-6">
      <h2 class="text-lg font-bold mb-2 text-[#4A4440]">Slow Morning</h2>
      <p class="text-sm leading-relaxed text-[#7A706A]">따뜻한 차 한 잔으로 시작하는 느릿한 아침, 공방의 작은 오브제들이 주는 평온한 기록들입니다.</p>
    </div>
  </section>

  <!-- 4. 큰 아치 사진 + 옆 설명 -->
  <section class="w-full px-6 py-8 flex gap-6 items-center bg-[#FFF8F0] mt-4">
    <div class="w-32 h-44 rounded-t-full overflow-hidden border-4 border-white shadow-lg">
      <img src="https://images.unsplash.com/photo-1579722370966-10332822c92e?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover">
    </div>
    <div class="flex-1">
      <h3 class="text-lg font-bold mb-1 text-[#4A4440]">Atelier Story</h3>
      <p class="text-sm text-[#7A706A]">매주 토요일, 함께 흙을 만지며 나만의 작은 도자기를 완성해가는 시간을 가집니다.</p>
    </div>
  </section>

</body>
</html>
