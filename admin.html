<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Research Admin</title>


<style>

body{

font-family:Arial, Helvetica, sans-serif;

background:#F2F2DF;

padding:40px;

color:#1A1A1A;

}



.container{

max-width:900px;

margin:auto;

background:white;

padding:40px;

border-radius:15px;

box-shadow:0 5px 20px rgba(0,0,0,0.1);

}



h1{

color:#8B6B4F;

}



h2{

margin-top:50px;

color:#8B6B4F;

}



label{

display:block;

margin-top:20px;

font-weight:bold;

font-size:14px;

}



input,
textarea{

width:100%;

padding:12px;

margin-top:8px;

border:1px solid #ddd;

border-radius:8px;

box-sizing:border-box;

font-size:14px;

}



textarea{

height:120px;

}



button{

margin-top:20px;

padding:12px 25px;

border:none;

background:#8B6B4F;

color:white;

border-radius:8px;

cursor:pointer;

font-size:14px;

}



button:hover{

background:#6a4e38;

}



/* project list */


.project-box{

border:1px solid #ddd;

border-radius:12px;

padding:20px;

margin-top:20px;

background:#fafafa;

}



.project-box h3{

margin:0;

color:#8B6B4F;

}



.project-buttons{

display:flex;

gap:10px;

margin-top:15px;

}



.edit-btn{

background:#4c7aaf;

}



.delete-btn{

background:#b84c4c;

}



#message{

margin-top:20px;

font-weight:bold;

}



.preview{

width:200px;

margin-top:15px;

border-radius:10px;

display:none;

}



hr{

margin:50px 0;

border:none;

border-top:1px solid #ddd;

}


</style>


</head>


<body>


<div class="container">


<h1>
Research Upload
</h1>



<label>
Title
</label>

<input id="title">



<label>
Type
</label>

<input id="type">



<label>
Image Path
</label>

<input 
id="image"
placeholder="example: scheme.png"
>



<img
id="image-preview"
class="preview"
>



<label>
Overview
</label>

<textarea id="overview"></textarea>



<label>
Research Strategy
</label>

<textarea id="strategy"></textarea>



<label>
Research Highlight
</label>

<textarea id="highlight"></textarea>



<label>
Publication
</label>

<textarea id="publication"></textarea>




<label>
Tags
</label>

<input 
id="tags"
placeholder="Cancer Metabolism, Nanomedicine"
>




<hr>



<h2>
Key Results
</h2>


<label>
Result Images (use |)
</label>

<input 
id="resultsImages"
placeholder="img1.png|img2.png"
>



<label>
Result Titles (use |)
</label>

<input 
id="resultsTitles"
placeholder="Title1|Title2"
>



<label>
Result Captions (use |)
</label>

<textarea id="resultsCaptions"></textarea>




<button id="save">

Save Project

</button>



<p id="message"></p>



<hr>



<h2>
Existing Projects
</h2>



<div id="project-list">

</div>



</div>
<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getFirestore,

collection,

addDoc,

getDocs,

doc,

updateDoc,

deleteDoc

}

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";




// Firebase 설정

const firebaseConfig = {


apiKey: "AIzaSyD_d4etBdBcvBRhTJlD3cLssN309LAdlfg",

authDomain: "yuri-research-portfolio.firebaseapp.com",

projectId: "yuri-research-portfolio",

storageBucket: "yuri-research-portfolio.firebasestorage.app",

messagingSenderId: "231317507996",

appId: "1:231317507996:web:9773282c138706d886c259",

measurementId: "G-57VHW2454E"

};





const app = initializeApp(firebaseConfig);


const db = getFirestore(app);




// 현재 수정 중인 document ID

let currentEditId = null;





// ========================
// Image Preview
// ========================


const imageInput = document.getElementById("image");

const imagePreview = document.getElementById("image-preview");



imageInput.addEventListener("input", ()=>{


const value = imageInput.value.trim();


if(value){

imagePreview.src=value;

imagePreview.style.display="block";

}

else{

imagePreview.style.display="none";

}


});





// ========================
// Save / Update Project
// ========================


document
.getElementById("save")
.addEventListener("click", async ()=>{


const data = {


title:
document.getElementById("title").value,


type:
document.getElementById("type").value,


image:
document.getElementById("image").value,


overview:
document.getElementById("overview").value,


strategy:
document.getElementById("strategy").value,


highlight:
document.getElementById("highlight").value,


publication:
document.getElementById("publication").value,



tags:

document
.getElementById("tags")
.value
.split(",")
.map(t=>t.trim())
.filter(t=>t),



resultsImages:

document
.getElementById("resultsImages")
.value
.split("|")
.map(t=>t.trim())
.filter(t=>t),



resultsTitles:

document
.getElementById("resultsTitles")
.value
.split("|")
.map(t=>t.trim())
.filter(t=>t),



resultsCaptions:

document
.getElementById("resultsCaptions")
.value
.split("|")
.map(t=>t.trim())
.filter(t=>t)

};




try{


// 수정

if(currentEditId){


await updateDoc(

doc(db,"projects",currentEditId),

data

);



document.getElementById("message").innerHTML=

"✅ Project updated";


currentEditId=null;


}



// 새 프로젝트

else{


await addDoc(

collection(db,"projects"),

data

);


document.getElementById("message").innerHTML=

"✅ Project uploaded";


}



clearForm();


loadProjects();


}


catch(error){


console.log(error);


document.getElementById("message").innerHTML=

"❌ Error";


}



});
 
// ========================
// Load Existing Projects
// ========================


async function loadProjects(){


const list = document.getElementById("project-list");


list.innerHTML="";



const snapshot = await getDocs(
collection(db,"projects")
);



snapshot.forEach((item)=>{


const data = item.data();


const box = document.createElement("div");


box.className="project-box";



box.innerHTML = `


<h3>
${data.title || ""}
</h3>


<p>
${data.type || ""}
</p>


<p>
${(data.tags || []).join(", ")}
</p>



<div class="project-buttons">


<button class="edit-btn">
Edit
</button>



<button class="delete-btn">
Delete
</button>



</div>


`;





// ========================
// Edit
// ========================


box
.querySelector(".edit-btn")
.addEventListener("click", ()=>{


currentEditId=item.id;



document.getElementById("title").value =
data.title || "";



document.getElementById("type").value =
data.type || "";



document.getElementById("image").value =
data.image || "";



document.getElementById("overview").value =
data.overview || "";



document.getElementById("strategy").value =
data.strategy || "";



document.getElementById("highlight").value =
data.highlight || "";



document.getElementById("publication").value =
data.publication || "";



document.getElementById("tags").value =
(data.tags || []).join(", ");



document.getElementById("resultsImages").value =
(data.resultsImages || []).join("|");



document.getElementById("resultsTitles").value =
(data.resultsTitles || []).join("|");



document.getElementById("resultsCaptions").value =
(data.resultsCaptions || []).join("|");




imagePreview.src=data.image || "";

imagePreview.style.display =
data.image ? "block" : "none";




document.getElementById("save").innerHTML =
"Update Project";



window.scrollTo({

top:0,

behavior:"smooth"

});


});






// ========================
// Delete
// ========================


box
.querySelector(".delete-btn")
.addEventListener("click", async ()=>{


const check =
confirm(
"Delete this project?"
);



if(!check) return;



await deleteDoc(

doc(
db,
"projects",
item.id
)

);



document.getElementById("message").innerHTML=

"🗑 Project deleted";



loadProjects();


});





list.appendChild(box);



});



}





// ========================
// Clear Form
// ========================


function clearForm(){



document
.querySelectorAll("input, textarea")
.forEach(el=>{


if(el.id !== "image-preview"){

el.value="";

}


});



imagePreview.style.display="none";


document.getElementById("save").innerHTML=
"Save Project";


}





// ========================
// Initial Load
// ========================


loadProjects();



</script>
