<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Research Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial, Helvetica, sans-serif;
background:#F2F2DF;
color:#1A1A1A;

}

/* ---------------- Login ---------------- */

#login-box{

width:420px;

margin:120px auto;

background:white;

padding:40px;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,.08);

}

#login-box h2{

margin-bottom:25px;

color:#8B6B4F;

}

#login-box input{

width:100%;

padding:12px;

border:1px solid #ddd;

border-radius:8px;

font-size:15px;

margin-bottom:20px;

}

#login-box button{

width:100%;

padding:14px;

background:#8B6B4F;

border:none;

color:white;

border-radius:8px;

cursor:pointer;

font-size:15px;

}

#login-msg{

margin-top:15px;

color:#b84c4c;

font-size:14px;

}

/* ---------------- Admin ---------------- */

.container{

display:none;

max-width:950px;

margin:40px auto;

background:white;

padding:40px;

border-radius:15px;

box-shadow:0 5px 20px rgba(0,0,0,.1);

}

h1{

color:#8B6B4F;

margin-bottom:30px;

}

h2{

margin-top:50px;

margin-bottom:15px;

color:#8B6B4F;

}

label{

display:block;

margin-top:20px;

font-weight:bold;

font-size:14px;

}

input,
textarea{

width:100%;

padding:12px;

margin-top:8px;

border:1px solid #ddd;

border-radius:8px;

font-size:14px;

}

textarea{

height:120px;

resize:vertical;

}

button{

padding:12px 25px;

border:none;

border-radius:8px;

background:#8B6B4F;

color:white;

cursor:pointer;

font-size:14px;

margin-top:20px;

}

button:hover{

background:#6a4e38;

}

.preview{

display:none;

margin-top:15px;

width:220px;

border-radius:10px;

}

#message{

margin-top:20px;

font-weight:bold;

}

hr{

margin:50px 0;

border:none;

border-top:1px solid #ddd;

}

/* ---------- Existing Projects ---------- */

.project-box{

background:#fafafa;

border:1px solid #ddd;

border-radius:12px;

padding:20px;

margin-bottom:20px;

}

.project-box h3{

color:#8B6B4F;

margin-bottom:10px;

}

.project-buttons{

display:flex;

gap:10px;

margin-top:15px;

}

.edit-btn{

background:#4c7aaf;

}

.delete-btn{

background:#b84c4c;

}

</style>

</head>

<body>

<!-- ================= LOGIN ================= -->

<div id="login-box">

<h2>Administrator Login</h2>

<input
id="password"
type="password"
placeholder="Password">

<button id="login">

Login

</button>

<p id="login-msg"></p>

</div>

<!-- ================= ADMIN ================= -->

<div class="container" id="admin-panel">

<h1>

Research Upload

</h1>

<label>Title</label>

<input id="title">

<label>Type</label>

<input id="type">

<label>Image Path</label>

<input
id="image"
placeholder="scheme.png">

<img
id="image-preview"
class="preview">

<label>Overview</label>

<textarea id="overview"></textarea>

<label>Research Strategy</label>

<textarea id="strategy"></textarea>

<label>Research Highlight</label>

<textarea id="highlight"></textarea>

<label>Publication</label>

<textarea id="publication"></textarea>

<label>Tags (comma separated)</label>

<input
id="tags"
placeholder="Cancer Metabolism, Nanomedicine">

<hr>

<h2>Key Results</h2>

<label>Result Images ( | )</label>

<input
id="resultsImages"
placeholder="img1.png|img2.png|img3.png">

<label>Result Titles ( | )</label>

<input
id="resultsTitles"
placeholder="Title1|Title2|Title3">

<label>Result Captions ( | )</label>

<textarea id="resultsCaptions"></textarea>

<button id="save">

Save Project

</button>

<p id="message"></p>

<hr>

<h2>Existing Projects</h2>

<div id="project-list"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

getFirestore,
collection,
addDoc,
getDocs,
doc,
updateDoc,
deleteDoc

}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


// ================= Firebase =================

const firebaseConfig = {

apiKey: "AIzaSyD_d4etBdBcvBRhTJlD3cLssN309LAdlfg",

authDomain: "yuri-research-portfolio.firebaseapp.com",

projectId: "yuri-research-portfolio",

storageBucket: "yuri-research-portfolio.firebasestorage.app",

messagingSenderId: "231317507996",

appId: "1:231317507996:web:9773282c138706d886c259",

measurementId: "G-57VHW2454E"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


// ================= Variables =================

let currentEditId = null;

const imageInput = document.getElementById("image");

const imagePreview = document.getElementById("image-preview");


// ================= Login =================

const ADMIN_PASSWORD = "yuri1234";

document
.getElementById("login")
.addEventListener("click", ()=>{

const pw =
document.getElementById("password").value;

if(pw===ADMIN_PASSWORD){

document.getElementById("login-box").style.display="none";

document.getElementById("admin-panel").style.display="block";

loadProjects();

}else{

document.getElementById("login-msg").innerHTML=
"Wrong password.";

}

});


// Enter Login

document
.getElementById("password")
.addEventListener("keydown",(e)=>{

if(e.key==="Enter"){

document.getElementById("login").click();

}

});


// ================= Image Preview =================

imageInput.addEventListener("input", ()=>{

const value=imageInput.value.trim();

if(value){

imagePreview.src=value;

imagePreview.style.display="block";

}else{

imagePreview.style.display="none";

}

});


// ================= Save =================

document
.getElementById("save")
.addEventListener("click", async ()=>{

const data={

title:
document.getElementById("title").value,

type:
document.getElementById("type").value,

image:
document.getElementById("image").value,

overview:
document.getElementById("overview").value,

strategy:
document.getElementById("strategy").value,

highlight:
document.getElementById("highlight").value,

publication:
document.getElementById("publication").value,

tags:

document
.getElementById("tags")
.value
.split(",")
.map(t=>t.trim())
.filter(Boolean),

resultsImages:

document
.getElementById("resultsImages")
.value
.split("|")
.map(t=>t.trim())
.filter(Boolean),

resultsTitles:

document
.getElementById("resultsTitles")
.value
.split("|")
.map(t=>t.trim())
.filter(Boolean),

resultsCaptions:

document
.getElementById("resultsCaptions")
.value
.split("|")
.map(t=>t.trim())
.filter(Boolean)

};

try{

// ---------- UPDATE ----------

if(currentEditId){

await updateDoc(

doc(db,"projects",currentEditId),

data

);

document.getElementById("message").innerHTML=

"✅ Project updated";

}

// ---------- ADD ----------

else{

await addDoc(

collection(db,"projects"),

data

);

document.getElementById("message").innerHTML=

"✅ Project uploaded";

}

clearForm();

await loadProjects();

}

catch(error){

console.log(error);

document.getElementById("message").innerHTML=

"❌ Upload failed";

}

});

// ========================
// Load Projects
// ========================

async function loadProjects(){

const list =
document.getElementById("project-list");

list.innerHTML="";

const snapshot =
await getDocs(collection(db,"projects"));

snapshot.forEach((item)=>{

const data=item.data();

const box=document.createElement("div");

box.className="project-box";

box.innerHTML=`

<h3>${data.title || ""}</h3>

<p>${data.type || ""}</p>

<p>${(data.tags || []).join(", ")}</p>

<div class="project-buttons">

<button class="edit-btn">

Edit

</button>

<button class="delete-btn">

Delete

</button>

</div>

`;


// ========================
// Edit
// ========================

box
.querySelector(".edit-btn")
.addEventListener("click",()=>{

currentEditId=item.id;

document.getElementById("title").value =
data.title || "";

document.getElementById("type").value =
data.type || "";

document.getElementById("image").value =
data.image || "";

document.getElementById("overview").value =
data.overview || "";

document.getElementById("strategy").value =
data.strategy || "";

document.getElementById("highlight").value =
data.highlight || "";

document.getElementById("publication").value =
data.publication || "";

document.getElementById("tags").value =
(data.tags || []).join(", ");

document.getElementById("resultsImages").value =
(data.resultsImages || []).join("|");

document.getElementById("resultsTitles").value =
(data.resultsTitles || []).join("|");

document.getElementById("resultsCaptions").value =
(data.resultsCaptions || []).join("|");


if(data.image){

imagePreview.src=data.image;

imagePreview.style.display="block";

}else{

imagePreview.style.display="none";

}

document.getElementById("save").innerHTML=
"Update Project";

document.getElementById("message").innerHTML=
"✏ Editing Project";

window.scrollTo({

top:0,

behavior:"smooth"

});

});


// ========================
// Delete
// ========================

box
.querySelector(".delete-btn")
.addEventListener("click",async()=>{

const ok=
confirm("Delete this project?");

if(!ok) return;

await deleteDoc(

doc(db,"projects",item.id)

);

clearForm();

document.getElementById("message").innerHTML=
"🗑 Project deleted";

await loadProjects();

});

list.appendChild(box);

});

}



// ========================
// Clear Form
// ========================

function clearForm(){

document
.querySelectorAll("input, textarea")
.forEach(el=>{

if(el.id!=="image-preview"){

el.value="";

}

});

imagePreview.style.display="none";

currentEditId=null;

document.getElementById("save").innerHTML=
"Save Project";

}



// ========================
// END
// ========================

</script>

</body>

</html>
