<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homebaking Diary</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 빈티지 다꾸 감성 배경과 손글씨 폰트 */
    @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Playfair+Display:ital@1&display=swap');
    
    body {
      background-color: #F5EFE6; /* 따뜻한 빈티지 종이색 */
      font-family: 'Nanum Pen Script', cursive;
    }
    .vintage-paper {
      background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
    }
    /* 요청하신 알약 모양(Capsule) 소제목 스타일 */
    .capsule-title {
      border: 2px solid #D4A373;
      border-radius: 9999px;
      padding: 2px 15px;
      display: inline-block;
      background-color: #FAEDCD;
      color: #9C6644;
      font-size: 1.1rem;
    }
  </style>
</head>
<body class="vintage-paper">

  <main class="max-w-[400px] mx-auto p-4 space-y-6">

    <header class="text-center pt-4">
      <h1 class="font-['Playfair_Display'] italic text-3xl text-[#9C6644] mb-2">Home Baking Log</h1>
      <p class="text-[#BC8A5F]">소소한 오븐 속 작은 행복 기록들</p>
    </header>

    <section>
      <div class="capsule-title mb-4">오늘의 베이킹</div>
      
      <div class="flex gap-2 justify-center -rotate-2">
        <div class="bg-white p-2 shadow-md border border-gray-100">
          <img src="https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&w=200&q=80" class="w-32 h-32 object-cover">
          <p class="text-center text-xs mt-1">갓 구운 스콘</p>
        </div>
        <div class="bg-white p-2 shadow-md border border-gray-100 rotate-3">
          <img src="https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&w=200&q=80" class="w-32 h-32 object-cover">
          <p class="text-center text-xs mt-1">딸기 케이크</p>
        </div>
      </div>
    </section>

    <section class="mt-6 border-t-2 border-dashed border-[#D4A373] pt-6">
      <div class="capsule-title mb-4">여행 & 일상</div>
      <p class="text-[#7F5539] leading-relaxed mb-4">
        여행지에서 만난 작은 카페들, 그리고 집에서 직접 구워내는 따뜻한 빵 냄새가 가득한 일상. 손으로 꾸미듯 차곡차곡 기록해 나갑니다.
      </p>
      
      <div class="grid grid-cols-2 gap-2">
        <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?auto=format&fit=crop&w=300&q=80" class="rounded-lg shadow-sm">
        <img src="https://images.unsplash.com/photo-1520699049848-528c25000780?auto=format&fit=crop&w=300&q=80" class="rounded-lg shadow-sm">
      </div>
    </section>

  </main>

</body>
</html>
