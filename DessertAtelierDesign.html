<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아냐의 디저트 작업실</title>
    <style>
        /* 배경 및 전체 폰트 */
        body { 
            background-color: #fcf9f7; 
            font-family: 'AppleSDGothicNeo-Regular', 'Malgun Gothic', sans-serif; 
            color: #5d4a46; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center;
        }
        .container { max-width: 500px; width: 100%; }

        /* 네비게이션 */
        nav { display: flex; justify-content: space-around; padding: 20px 0; font-size: 14px; letter-spacing: 1px; }

        /* 헤더 섹션 */
        .hero { text-align: center; padding: 40px 0; }
        .hero-img { width: 220px; height: 220px; border-radius: 50%; border: 3px solid #e8d5d1; object-fit: cover; }
        .hero h1 { font-size: 20px; margin: 20px 0 10px; }
        .hero p { font-size: 13px; line-height: 1.6; color: #8c7673; }
        .order-btn { display: inline-block; margin-top: 20px; padding: 10px 40px; border: 1px solid #dcbdbd; border-radius: 25px; text-decoration: none; color: #5d4a46; font-size: 13px; }

        /* 가격 섹션 */
        .price-section { margin-top: 50px; }
        .section-title { text-align: center; font-size: 22px; margin-bottom: 50px; color: #5d4a46; }
        
        .item-row { display: flex; align-items: flex-start; margin-bottom: 60px; gap: 20px; }
        .item-row:nth-child(even) { flex-direction: row-reverse; }

        /* 폴라로이드 스타일 */
        .polaroid { background: white; padding: 10px 10px 30px 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); width: 160px; transform: rotate(-3deg); }
        .item-row:nth-child(even) .polaroid { transform: rotate(3deg); }
        .polaroid img { width: 100%; height: 160px; object-fit: cover; }

        /* 텍스트 내용 */
        .content { flex: 1; padding-top: 10px; }
        .content h2 { font-size: 16px; margin-bottom: 10px; }
        .content ul { list-style: none; padding: 0; font-size: 14px; line-height: 2; }
        .note { font-size: 12px; color: #a89492; margin-top: 5px; }

        /* 별 포인트 */
        .sparkle { color: #dcbdbd; margin: 0 5px; }

        /* 모바일 대응 */
        @media (max-width: 480px) {
            .item-row, .item-row:nth-child(even) { flex-direction: column; align-items: center; text-align: center; }
            .polaroid { transform: rotate(0deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <nav>
        <span>프라이스</span><span>질문</span><span>연락처</span>
    </nav>

    <header class="hero">
        <img src="이미지주소.jpg" alt="프로필" class="hero-img">
        <h1>아냐</h1>
        <p>홈 베이킹 3년차입니다.<br>가장 맛있는 케이크를 만듭니다.</p>
        <a href="#" class="order-btn">주문하기</a>
    </header>

    <section class="price-section">
        <h2 class="section-title">✨ 가격표 ✨</h2>

        <div class="item-row">
            <div class="polaroid"><img src="마카롱사진.jpg" alt="마카롱"></div>
            <div class="content">
                <h2>"마카롱"</h2>
                <ul>
                    <li>6구: 600원</li>
                    <li>9구: 900원</li>
                    <li>12구: 1200원</li>
                </ul>
                <div class="note">맛: 레몬, 딸기, 바닐라, 초콜릿</div>
            </div>
        </div>

        <div class="item-row">
            <div class="polaroid"><img src="케이크사진.jpg" alt="벤토케이크"></div>
            <div class="content">
                <h2>"벤토 케이크"</h2>
                <ul>
                    <li>2인: 800원</li>
                    <li>4인: 1200원</li>
                    <li>6인: 1700원</li>
                </ul>
                <div class="note">맛: 딸기, 바닐라, 초콜릿</div>
            </div>
        </div>
    </section>
</div>

</body>
</html>
