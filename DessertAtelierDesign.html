<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아냐의 디저트 작업실</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        /* 배경 및 전체 폰트 (아이보리 톤 배경) */
        body { 
            background-color: #f7f5f0; 
            font-family: 'Noto Sans KR', sans-serif; 
            color: #4a5d4e; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 매거진 카드 컨테이너 */
        .container { 
            max-width: 420px; 
            width: 100%; 
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(74, 93, 78, 0.08);
            padding: 30px 25px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* 장식용 꽃 스티커 (배경 포인트) */
        .flower-sticker-1 {
            position: absolute;
            top: 15px;
            right: 20px;
            width: 35px;
            height: 35px;
            opacity: 0.6;
        }

        .flower-sticker-2 {
            position: absolute;
            bottom: 30px;
            left: 20px;
            width: 40px;
            height: 40px;
            opacity: 0.5;
            transform: rotate(25deg);
        }

        /* 네비게이션 (첫 번째 래퍼런스 상단 바 스타일) */
        nav { 
            display: flex; 
            justify-content: space-around; 
            padding: 10px 0 25px 0; 
            font-family: 'Noto Serif KR', serif;
            font-size: 13px; 
            letter-spacing: 1.5px; 
            color: #8c9a8e;
            border-bottom: 1px solid #eeeada;
            margin-bottom: 30px;
        }
        nav span {
            cursor: pointer;
            transition: color 0.2s;
        }
        nav span:hover {
            color: #5c7660;
        }

        /* 헤더 섹션 (첫 번째 래퍼런스 대문 Hero 스타일 반영) */
        .hero { 
            text-align: center; 
            padding: 10px 0 40px 0; 
            position: relative;
        }
        
        /* 아치형 프로필 이미지 프레임 */
        .hero-img-container {
            width: 200px; 
            height: 260px; 
            margin: 0 auto;
            border-radius: 100px 100px 0 0; /* 상단 아치형태 */
            overflow: hidden;
            border: 4px solid #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            background-color: #f2f5f1;
        }
        .hero-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        /* 아치형 위 곡선 타이틀 */
        .hero-title-top {
            font-family: 'Noto Serif KR', serif;
            font-size: 15px;
            color: #7d9181;
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .hero h1 { 
            font-family: 'Noto Serif KR', serif;
            font-size: 22px; 
            margin: 20px 0 10px; 
            color: #4a5d4e;
            font-weight: 700;
        }
        
        .hero p { 
            font-size: 13px; 
            line-height: 1.7; 
            color: #738275; 
            margin: 0 auto;
            max-width: 300px;
        }

        .order-btn { 
            display: inline-block; 
            margin-top: 25px; 
            padding: 12px 45px; 
            background-color: #f4f7f4;
            border: 1px solid #d4ded5; 
            border-radius: 30px; 
            text-decoration: none; 
            color: #5c7660; 
            font-size: 13px; 
            font-weight: 500;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .order-btn:hover {
            background-color: #e8f0e9;
        }

        /* 가격 섹션 */
        .price-section { 
            margin-top: 30px; 
            border-top: 1px solid #eeeada;
            padding-top: 35px;
        }
        
        .section-title { 
            text-align: center; 
            font-family: 'Noto Serif KR', serif;
            font-size: 20px; 
            margin-bottom: 40px; 
            color: #4a5d4e; 
            letter-spacing: 1px;
        }
        
        /* 아이템 레이아웃 (지그재그 배치 및 아치형 사진 적용) */
        .item-row { 
            display: flex; 
            align-items: center; 
            margin-bottom: 45px; 
            gap: 20px; 
        }
        .item-row:nth-child(even) { 
            flex-direction: row-reverse; 
        }

        /* 아치형 폴라로이드/카드 프레임 */
        .arch-card { 
            background: #fbfaf7; 
            padding: 10px 10px 20px 10px; 
            box-shadow: 0 6px 18px rgba(74, 93, 78, 0.06); 
            width: 140px; 
            border-radius: 12px;
            box-sizing: border-box;
            text-align: center;
        }
        
        .arch-img-box {
            width: 100%;
            height: 150px;
            border-radius: 70px 70px 0 0; /* 아치 스타일 */
            overflow: hidden;
            margin-bottom: 10px;
        }
        
        .arch-card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        .arch-caption {
            font-size: 11px;
            color: #8c9a8e;
            font-family: 'Noto Serif KR', serif;
            letter-spacing: 1px;
        }

        /* 텍스트 내용 */
        .content { 
            flex: 1; 
        }
        .content h2 { 
            font-family: 'Noto Serif KR', serif;
            font-size: 16px; 
            margin: 0 0 10px; 
            color: #4a5d4e; 
        }
        .content ul { 
            list-style: none; 
            padding: 0; 
            margin: 0;
            font-size: 13px; 
            line-height: 1.8; 
            color: #637566; 
        }
        .note { 
            font-size: 11px; 
            color: #9aa89c; 
            margin-top: 8px; 
            line-height: 1.4;
        }

        /* 모바일 대응 */
        @media (max-width: 480px) {
            .container { padding: 20px 15px; }
            .item-row, .item-row:nth-child(even) { 
                flex-direction: column; 
                align-items: center; 
                text-align: center; 
            }
            .content { width: 100%; }
            .content ul { display: inline-block; text-align: left; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 장식용 꽃 스티커 SVG 삽입 -->
    <svg class="flower-sticker-1" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 20C55 10 70 5 80 15C90 25 85 40 75 45C85 55 90 70 80 80C70 90 55 85 50 75C45 85 30 90 20 80C10 70 15 55 25 45C15 40 10 25 20 15C30 5 45 10 50 20Z" fill="#e2ebd4" stroke="#c8d6ba" stroke-width="3"/>
        <circle cx="50" cy="50" r="12" fill="#d4e2c6"/>
    </svg>

    <svg class="flower-sticker-2" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 20C55 10 70 5 80 15C90 25 85 40 75 45C85 55 90 70 80 80C70 90 55 85 50 75C45 85 30 90 20 80C10 70 15 55 25 45C15 40 10 25 20 15C30 5 45 10 50 20Z" fill="#f4ebd0" stroke="#e3d6b5" stroke-width="3"/>
        <circle cx="50" cy="50" r="12" fill="#e8dcbc"/>
    </svg>

    <nav>
        <span>프라이스</span>
        <span>질문</span>
        <span>연락처</span>
    </nav>

    <header class="hero">
        <div class="hero-title-top">engel van het licht</div>
        <div class="hero-img-container">
            <img src="이미지주소.jpg" alt="프로필" class="hero-img">
        </div>
        <h1>아냐</h1>
        <p>홈 베이킹 3년차입니다.<br>가장 맛있는 케이크를 만듭니다.</p>
        <a href="#" class="order-btn">주문하기</a>
    </header>

    <section class="price-section">
        <h2 class="section-title">✨ 디저트 가격표 ✨</h2>

        <div class="item-row">
            <div class="arch-card">
                <div class="arch-img-box">
                    <img src="마카롱사진.jpg" alt="마카롱">
                </div>
                <div class="arch-caption">MACARON</div>
            </div>
            <div class="content">
                <h2>"마카롱"</h2>
                <ul>
                    <li>6구: 600원</li>
                    <li>9구: 900원</li>
                    <li>12구: 1200원</li>
                </ul>
                <div class="note">맛: 레몬, 딸기, 바닐라, 초콜릿</div>
            </div>
        </div>

        <div class="item-row">
            <div class="arch-card">
                <div class="arch-img-box">
                    <img src="케이크사진.jpg" alt="벤토케이크">
                </div>
                <div class="arch-caption">BENTO CAKE</div>
            </div>
            <div class="content">
                <h2>"벤토 케이크"</h2>
                <ul>
                    <li>2인: 800원</li>
                    <li>4인: 1200원</li>
                    <li>6인: 1700원</li>
                </ul>
                <div class="note">맛: 딸기, 바닐라, 초콜릿</div>
            </div>
        </div>
    </section>
</div>

</body>
</html>
