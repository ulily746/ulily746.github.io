<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Diary - Hero</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F7F2EA; color: #5A4C43; margin: 0; }
        .serif { font-family: 'Cormorant Garamond', serif; }
        .hand { font-family: 'Caveat', cursive; }
    </style>
</head>
<body>

    <header class="relative w-full h-screen p-16 flex flex-col justify-between">
        
        <div class="z-10">
            <h1 class="serif text-[10rem] leading-none font-bold">Travel</h1>
        </div>
        
        <div class="absolute inset-0 flex items-center justify-center p-32">
            <div class="w-full h-full border-[20px] border-white shadow-2xl overflow-hidden">
                <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1600&q=80" 
                     class="w-full h-full object-cover">
            </div>
        </div>

        <div class="z-10 text-right">
            <h1 class="serif text-[10rem] leading-none font-bold">Diary</h1>
        </div>
        
    </header>

</body>
</html>
