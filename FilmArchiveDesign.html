<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>필름 아카이브</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-[#1E251C] py-6 px-4 flex justify-center antialiased">

  <div class="w-full max-w-md bg-[#EFECE3] rounded-[32px] shadow-2xl overflow-hidden flex flex-col relative text-[#403B32] font-sans border border-[#D5D0C1]">
    
    <div class="absolute top-6 left-6 z-10">
      <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-white/70 backdrop-blur-xs flex items-center justify-center text-[#403B32] hover:bg-white transition">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
      </button>
    </div>

    <!-- 1. 아날로그 스크랩북 스타일 타이틀 -->
    <div class="pt-20 px-8 pb-4 text-center">
      <p class="text-[9px] tracking-[0.2em] uppercase font-bold text-[#8C8472] mb-1">@film_archive</p>
      <h1 class="text-lg font-serif tracking-wider text-[#2B2720] font-bold uppercase">ТАПЛИНК НА ТЕМУ ДЕТСТВА</h1>
      <p class="text-xs text-[#736B5E] italic mt-0.5">(유년 시절의 기록)</p>
    </div>

    <!-- 2. 마스킹 테이프로 붙인 듯한 사진 블록 -->
    <div class="mx-6 my-4 p-5 bg-[#FAF9F5] rounded-2xl border border-[#D5D0C1] relative shadow-2xs">
      <!-- 테이프 오버레이 표현 -->
      <div class="absolute -top-2.5 left-1/2 transform -translate-x-1/2 w-20 h-4 bg-[#E1DBCA]/70 border border-dashed border-[#BDB59F]/40 rotate-[-1deg]"></div>
      
      <div class="flex items-center gap-1.5 text-[10px] font-bold text-[#636A52] uppercase mb-3">
        <i data-lucide="camera" class="w-3.5 h-3.5"></i><span>CHILDHOOD MEMORY</span>
      </div>
      <div class="rounded-xl overflow-hidden aspect-[4/3] bg-gray-100 mb-3">
        <img src="https://images.unsplash.com/photo-1502082553048-f009c37129b9?auto=format&fit=crop&w=500&q=80" alt="Childhood" class="w-full h-full object-cover grayscale-[15%]">
      </div>
      <p class="text-[11px] leading-relaxed text-[#5C5549] italic text-center px-1">
        "시골 외할머니 댁 평상에 누워 올려다보던 여름밤의 은하수, 그 속의 순수함."
      </p>
    </div>

    <!-- 3. 필름 스트립 연속 컷 구현 섹션 -->
    <div class="mx-6 my-2 p-5 bg-[#242320] text-[#EFECE3] rounded-2xl border border-black shadow-inner">
      <div class="flex items-center justify-center gap-1.5 text-[10px] tracking-widest text-[#D5CEB6] uppercase mb-3">
        <i data-lucide="film" class="w-3.5 h-3.5"></i><span>MEMORIES ON FILM</span>
      </div>
      <!-- 필름 프레임 1개 예시 -->
      <div class="border-y-4 border-dashed border-[#121211] bg-black p-1.5 rounded-sm">
        <div class="aspect-[21/9] rounded-xs overflow-hidden grayscale">
          <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=400&q=80" alt="Film" class="w-full h-full object-cover">
        </div>
      </div>
    </div>

    <!-- 4. 독립출판 및 링크 연결 푸터 -->
    <div class="mt-auto p-6 bg-[#FAF9F5] border-t border-[#D5D0C1] text-center">
      <div class="space-y-2 max-w-xs mx-auto">
        <a href="#" class="flex items-center justify-center gap-2 bg-[#403B32] text-[#EFECE3] text-xs font-medium py-3 rounded-xl shadow-xs">
          <i data-lucide="book-open" class="w-3.5 h-3.5"></i><span>사진집 구매하기</span>
        </a>
      </div>
    </div>

  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
