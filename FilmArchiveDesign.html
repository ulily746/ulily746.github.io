<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        /* 기본 배경 및 폰트 */
        body {
            background-color: #f4efdc; /* 빈티지 종이 색상 */
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        /* 대문 섹션 */
        .hero { text-align: center; margin-bottom: 50px; }
        .hero h1 { font-size: 3rem; letter-spacing: 2px; margin: 0; }
        .hero img { width: 100%; border: 5px solid #fff; box-shadow: 5px 5px 15px rgba(0,0,0,0.1); }

        /* 사진 배치 기본 스타일 */
        .photo-box { margin: 40px 0; display: flex; align-items: center; justify-content: center; }
        
        /* 필름 프레임 효과 */
        .film-frame {
            background: #000;
            padding: 10px 10px 30px 10px; /* 아래쪽을 길게 하여 필름 느낌 */
            border-radius: 5px;
            box-shadow: 10px 10px 20px rgba(0,0,0,0.2);
        }
        .film-frame img { width: 100%; display: block; }

        /* 기울어진 사진 효과 */
        .tilted {
            transform: rotate(-3deg);
            background: white;
            padding: 10px;
            box-shadow: 5px 5px 10px rgba(0,0,0,0.15);
        }

        /* 텍스트 스타일 */
        .text-note { font-style: italic; color: #555; text-align: center; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <!-- 대문 -->
    <header class="hero">
        <h1>CHILDHOOD</h1>
        <img src="https://picsum.photos/600/400" alt="main">
        <h2>IN THE COUNTRYSIDE</h2>
    </header>

    <!-- 필름 섹션 -->
    <section class="photo-box">
        <div class="film-frame">
            <img src="https://picsum.photos/500/250" alt="film">
        </div>
    </section>

    <p class="text-note">"바람 소리와 함께 걷던 그날의 기억들"</p>

    <!-- 기울어진 사진 섹션 -->
    <section class="photo-box">
        <img src="https://picsum.photos/300/400" class="tilted" alt="photo">
    </section>

    <p class="text-note">어디서든 행복했던 시간.</p>
</div>

</body>
</html>
