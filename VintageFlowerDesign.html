<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>유러피안 플라워 숍</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-[#2D2A26] py-6 px-4 flex justify-center antialiased">

  <div class="w-full max-w-md bg-[#F2EDE4] rounded-[36px] shadow-2xl overflow-hidden flex flex-col relative text-[#423C36] font-sans border border-[#E1D9CD]">
    
    <div class="absolute top-6 left-6 right-6 z-10 flex items-center justify-between">
      <button onclick="window.history.back()" class="w-10 h-10 rounded-full bg-white/70 backdrop-blur-xs flex items-center justify-center text-[#423C36] hover:bg-white transition">
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
      </button>
      <span class="font-serif tracking-widest text-[10px] uppercase font-bold text-[#6B6155]">БУКЕТНАЯ</span>
      <div class="w-4"></div>
    </div>

    <div class="relative w-full aspect-[4/3] bg-zinc-200">
      <img src="https://images.unsplash.com/photo-1507504038482-7621c4b24ee1?auto=format&fit=crop&w=600&q=80" class="w-full h-full object-cover">
      <div class="absolute inset-0 bg-black/10"></div>
      <div class="absolute bottom-6 left-6 right-6 text-white text-center drop-shadow-md">
        <h1 class="text-lg font-serif tracking-wider uppercase font-bold">마음속에 깊이 스며들 계절 꽃</h1>
      </div>
    </div>

    <div class="p-6 bg-[#FAF7F2] border-b border-[#E1D9CD]">
      <div class="flex items-center gap-1 text-[10px] font-bold text-[#8A7A68] uppercase mb-2">
        <i data-lucide="info" class="w-3.5 h-3.5"></i><span>Philosophy</span>
      </div>
      <p class="text-xs leading-relaxed text-[#6B6155]">
        인위적인 포장을 덜어내고, 자연 정원 그대로의 자유로운 선과 흐름을 지향합니다. 계절의 온도를 품고 자란 들꽃들로 한 편의 편지 같은 부케를 전합니다.
      </p>
    </div>

    <div class="p-6 text-center">
      <h3 class="text-xs font-bold tracking-wider uppercase text-[#8A7A68] mb-4">오늘의 추천 부케</h3>
      <div class="bg-[#FAF7F2] p-5 rounded-3xl border border-[#E1D9CD] flex flex-col items-center">
        <div class="w-28 aspect-[3/4] rounded-t-full overflow-hidden border-2 border-white shadow-xs mb-3">
          <img src="https://images.unsplash.com/photo-1561181286-d3fee7d55364?auto=format&fit=crop&w=300&q=80" class="w-full h-full object-cover">
        </div>
        <h4 class="text-xs font-serif font-bold text-[#2D2A26]">«После дождя» (비 온 뒤)</h4>
        <p class="text-[11px] text-[#8A7A68] font-serif font-bold mt-1">75,000원</p>
        <button class="mt-3 bg-[#423C36] text-white text-[10px] px-4 py-2 rounded-xl">카카오톡 예약하기</button>
      </div>
    </div>

    <div class="p-6 bg-[#2D2A26] text-[#F2EDE4] text-center mt-auto rounded-t-[28px]">
      <p class="text-[10px] tracking-widest opacity-70">Atelier Букетная</p>
    </div>

  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
