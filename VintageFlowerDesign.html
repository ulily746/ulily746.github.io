<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
        getFirestore,
        doc,
        getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // Firebase 설정값
    const firebaseConfig = {
        // 기존에 사용하던 Firebase Config를 여기에 넣기
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadVintageFlower() {

        try {

            // Firebase Firestore 문서
            const docRef = doc(db, "vintageflowedesign", "vintageflowedesign");
            const docSnap = await getDoc(docRef);

            if (!docSnap.exists()) {
                console.error("vintageflowedesign 문서를 찾을 수 없습니다.");
                return;
            }

            const data = docSnap.data();

            // 모든 data-field 요소에 Firebase 값 적용
            document.querySelectorAll("[data-field]").forEach(element => {

                const field = element.dataset.field;
                const value = data[field];

                if (value === undefined || value === null) return;

                const cleanValue = String(value).trim();

                if (element.tagName === "IMG") {

                    element.src = cleanValue;

                } else if (element.tagName === "VIDEO") {

                    element.src = cleanValue;

                } else if (element.tagName === "SOURCE") {

                    element.src = cleanValue;

                } else {

                    element.textContent = cleanValue;

                }

            });

        } catch (error) {

            console.error(
                "Firebase 데이터를 불러오는 중 오류가 발생했습니다:",
                error
            );

        }

    }

    loadVintageFlower();

</script>
