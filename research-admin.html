<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Archive — Slow Moments</title>
    <link rel="stylesheet" href="archive.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>

<div class="archive-wrapper">
    
    <aside class="archive-sidebar">
        <div class="sidebar-sticky">
            <div class="sidebar-title">
                <span class="sub-script">Slow Living</span>
                <h2>Archive</h2>
            </div>

            <div class="search-box">
                <input type="text" placeholder="Search our moments...">
                <button type="button" class="search-btn">🔍</button>
            </div>

            <nav class="category-nav">
                <h3>Categories</h3>
                <ul>
                    <li class="active"><a href="#">All Memories <span class="count">12</span></a></li>
                    <li><a href="#">Travel <span class="count">4</span></a></li>
                    <li><a href="#">Life <span class="count">5</span></a></li>
                    <li><a href="#">Academic <span class="count">3</span></a></li>
                </ul>
            </nav>

            <div class="tag-box">
                <h3>Tags</h3>
                <div class="tags">
                    <a href="#">#제주바다</a>
                    <a href="#">#오후티타임</a>
                    <a href="#">#연구실</a>
                    <a href="#">#일상기록</a>
                </div>
            </div>
        </div>
    </aside>

    <main class="archive-content">
        <div class="archive-grid">
            
            <div class="archive-card type-arch">
                <div class="card-img-wrap">
                    <img src="images/travel1.jpg" alt="Travel Image">
                </div>
                <div class="card-txt">
                    <span class="category">TRAVEL</span>
                    <h3 class="title">부서지는 파도와 맑은 조각달</h3>
                    <p class="date">2026.07.12</p>
                </div>
            </div>

            <div class="archive-card type-oval">
                <div class="card-img-wrap">
                    <img src="images/life1.jpg" alt="Life Image">
                </div>
                <div class="card-txt">
                    <span class="category">LIFE</span>
                    <h3 class="title">오후 4시의 따스한 밀크티</h3>
                    <p class="date">2026.07.10</p>
                </div>
            </div>

            <div class="archive-card type-bottom-round">
                <div class="card-img-wrap">
                    <img src="images/academic1.jpg" alt="Academic Image">
                </div>
                <div class="card-txt">
                    <span class="category">ACADEMIC</span>
                    <h3 class="title">생각의 흔적이 머무는 책상</h3>
                    <p class="date">2026.07.05</p>
                </div>
            </div>

            <div class="archive-card type-rect">
                <div class="card-img-wrap">
                    <img src="images/travel2.jpg" alt="Travel Image">
                </div>
                <div class="card-txt">
                    <span class="category">TRAVEL</span>
                    <h3 class="title">낯선 골목길에서 마주친 초록</h3>
                    <p class="date">2026.06.28</p>
                </div>
            </div>

        </div>
    </main>

</div>

</body>
</html>
